<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Chat Simples</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 10px; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; background: #fafafa; }
    input { width: 75%; padding: 10px; }
    button { padding: 10px; }
    .msg { margin: 6px 0; padding: 8px; background: #e6e6e6; border-radius: 8px; }
  </style>
</head>
<body>

<h2>Chat 💬</h2>

<div id="chat"></div>

<input id="msg" placeholder="Digite sua mensagem..." />
<button onclick="sendMsg()">Enviar</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔥 FIREBASE DO TEU PROJETO
  const firebaseConfig = {
    apiKey: "AIzaSyBsBzWXNF4JPzZDQ2ov6KzDFxm7dxJLmdU",
    authDomain: "chat-a1927.firebaseapp.com",
    projectId: "chat-a1927",
    storageBucket: "chat-a1927.firebasestorage.app",
    messagingSenderId: "450148123040",
    appId: "1:450148123040:web:f7a91bbf5bd1e18d42a4c5",
    measurementId: "G-67BHMDJ8DH"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const chat = document.getElementById("chat");

  // tempo real
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      const div = document.createElement("div");
      div.className = "msg";
      div.textContent = doc.data().text;
      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  });

  // enviar mensagem
  window.sendMsg = async function () {
    const input = document.getElementById("msg");
    const text = input.value;
    input.value = "";

    if (!text) return;

    await addDoc(collection(db, "messages"), {
      text: text,
      createdAt: Date.now()
    });
  };
</script>

</body>
</html>
