<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Chat Firebase</title>

  <!-- PWA -->
  <link
    rel="manifest"
    href="manifest.json"
  >

  <meta
    name="theme-color"
    content="#202c33"
  >

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial;
      background:#0b141a;
      overflow:hidden;
    }

    .topo{
      background:#202c33;
      color:white;
      padding:15px;
      font-size:20px;
      font-weight:bold;
      position:fixed;
      top:0;
      width:100%;
      z-index:10;
    }

    #chat{

      margin-top:60px;

      height:calc(100dvh - 140px);

      overflow-y:auto;

      display:flex;

      flex-direction:column;

      gap:10px;

      padding:15px;

      padding-bottom:120px;

      scroll-behavior:smooth;

    }

    .msg{
      max-width:75%;
      padding:10px;
      border-radius:10px;
      color:white;
      word-break:break-word;
    }

    .me{
      align-self:flex-end;
      background:#005c4b;
    }

    .other{
      align-self:flex-start;
      background:#202c33;
    }

    .name{
      font-size:11px;
      opacity:.7;
      margin-bottom:5px;
    }

    .bottom{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      gap:10px;
      padding:10px;
      background:#202c33;
    }

    input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    button{
      border:none;
      background:#00a884;
      color:white;
      padding:12px 18px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    #popup{

      position:fixed;

      top:70px;

      left:50%;

      transform:translateX(-50%);

      background:#202c33;

      color:white;

      padding:12px 18px;

      border-radius:10px;

      z-index:9999;

      opacity:0;

      transition:.3s;

      max-width:85%;

      text-align:center;

      pointer-events:none;

      box-shadow:
        0 0 10px rgba(0,0,0,.4);

    }

    #popup.show{

      opacity:1;

      top:90px;

    }

  </style>

</head>

<body>

  <div class="topo">
    Chat 💬
  </div>

  <div id="chat"></div>

  <div id="popup"></div>

  <div class="bottom">

    <input
      id="msg"
      placeholder="Digite uma mensagem..."
    >

    <button onclick="sendMsg()">
      Enviar
    </button>

  </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,

  collection,

  addDoc,

  onSnapshot,

  query,

  orderBy

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// firebase
const firebaseConfig = {

  apiKey:"SUA_API_KEY",

  authDomain:
    "chat-a1927.firebaseapp.com",

  projectId:
    "chat-a1927",

  storageBucket:
    "chat-a1927.firebasestorage.app",

  messagingSenderId:
    "450148123040",

  appId:
    "1:450148123040:web:f7a91bbf5bd1e18d42a4c5"

};


// iniciar
const app =
  initializeApp(firebaseConfig);

const db =
  getFirestore(app);


// elementos
const chat =
  document.getElementById("chat");

const input =
  document.getElementById("msg");

const popup =
  document.getElementById("popup");


// usuário
let userId =
  localStorage.getItem("userId");

if(!userId){

  userId =
    "user_" +
    Math.floor(
      Math.random() * 99999
    );

  localStorage.setItem(
    "userId",
    userId
  );

}


// pedir notificação
async function askNotificationPermission(){

  if(!("Notification" in window)){
    return;
  }

  if(
    Notification.permission !==
    "granted"
  ){

    await Notification
    .requestPermission();

  }

}

askNotificationPermission();


// service worker
if("serviceWorker" in navigator){

  navigator.serviceWorker.register(
    "./sw.js"
  );

}


// som
const audio = new Audio(
  "https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3"
);


// vibração
function vibratePhone(){

  if(navigator.vibrate){

    navigator.vibrate([
      200,
      100,
      200
    ]);

  }

}


// scroll
function scrollBottom(){

  setTimeout(() => {

    chat.scrollTop =
      chat.scrollHeight + 9999;

  }, 100);

}


// popup
function showPopup(text){

  popup.innerText =
    "💬 " + text;

  popup.classList.add("show");

  setTimeout(() => {

    popup.classList.remove("show");

  }, 3000);

}


// usuário fora?
function isUserAway(){

  return document.hidden;

}


// query
const q = query(

  collection(db, "messages"),

  orderBy("createdAt")

);


// controle
let firstLoad = true;


// realtime
onSnapshot(q, (snapshot) => {

  chat.innerHTML = "";

  let lastMessage = null;

  snapshot.forEach((doc) => {

    const data = doc.data();

    lastMessage = data;

    const div =
      document.createElement("div");

    div.classList.add("msg");

    if(data.userId === userId){

      div.classList.add("me");

    }else{

      div.classList.add("other");

    }

    div.innerHTML = `

      <div class="name">
        ${data.userId}
      </div>

      <div>
        ${data.text}
      </div>

    `;

    chat.appendChild(div);

  });

  scrollBottom();


  // nova msg
  if(

    !firstLoad &&

    lastMessage &&

    lastMessage.userId !== userId

  ){

    if(isUserAway()){

      // som
      audio.play();

      // vibra
      vibratePhone();

      // popup
      showPopup(lastMessage.text);

      // notificação android
      navigator.serviceWorker
      ?.ready
      .then((registration) => {

        registration.showNotification(
          "Nova mensagem 💬",
          {

            body:lastMessage.text,

            icon:
              "https://cdn-icons-png.flaticon.com/512/733/733585.png",

            vibrate:[200,100,200]

          }
        );

      });

      // título
      document.title =
        "💬 Nova mensagem!";

      setTimeout(() => {

        document.title =
          "Chat Firebase";

      }, 3000);

    }

  }

  firstLoad = false;

});


// enviar
window.sendMsg = async function(){

  const text =
    input.value.trim();

  if(!text) return;

  input.value = "";

  await addDoc(

    collection(db, "messages"),

    {

      text:text,

      userId:userId,

      createdAt:Date.now()

    }

  );

};


// enter
input.addEventListener(

  "keypress",

  function(e){

    if(e.key === "Enter"){

      sendMsg();

    }

  }

);

</script>

</body>

</html>
