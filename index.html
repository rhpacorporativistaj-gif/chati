<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Chat WhatsApp Style</title>

  <style>
    body {
      font-family: Arial;
      background: #111b21;
      margin: 0;
      padding: 0;
    }

    .topo {
      background: #202c33;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    #chat {
      height: calc(100vh - 120px);
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0b141a;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
      color: white;
      word-wrap: break-word;
    }

    .me {
      align-self: flex-end;
      background: #005c4b;
    }

    .other {
      align-self: flex-start;
      background: #202c33;
    }

    .name {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 5px;
    }

    .bottom {
      display: flex;
      padding: 10px;
      background: #202c33;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #00a884;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="topo">
  Chat 💬
</div>

<div id="chat"></div>

<div class="bottom">
  <input id="msg" placeholder="Digite..." />
  <button onclick="sendMsg()">Enviar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "chat-a1927.firebaseapp.com",
  projectId: "chat-a1927",
  storageBucket: "chat-a1927.firebasestorage.app",
  messagingSenderId: "450148123040",
  appId: "1:450148123040:web:f7a91bbf5bd1e18d42a4c5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chat = document.getElementById("chat");


// ID do usuário
let userId = localStorage.getItem("userId");

if (!userId) {
  userId = "user_" + Math.floor(Math.random() * 100000);
  localStorage.setItem("userId", userId);
}


// pedir permissão notificação
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}


// query mensagens
const q = query(
  collection(db, "messages"),
  orderBy("createdAt")
);

let loaded = false;

onSnapshot(q, (snapshot) => {

  chat.innerHTML = "";

  snapshot.forEach(doc => {

    const data = doc.data();

    const div = document.createElement("div");

    div.classList.add("msg");

    // se for minha msg
    if (data.userId === userId) {
      div.classList.add("me");
    } else {
      div.classList.add("other");

      // notificação
      if (loaded && Notification.permission === "granted") {
        new Notification("Nova mensagem", {
          body: data.text
        });
      }
    }

    div.innerHTML = `
      <div class="name">${data.userId}</div>
      <div>${data.text}</div>
    `;

    chat.appendChild(div);

  });

  loaded = true;

  chat.scrollTop = chat.scrollHeight;

});


// enviar
window.sendMsg = async function () {

  const input = document.getElementById("msg");

  const text = input.value.trim();

  if (!text) return;

  input.value = "";

  await addDoc(collection(db, "messages"), {
    text,
    userId,
    createdAt: Date.now()
  });

};


// enter envia
document.getElementById("msg")
.addEventListener("keypress", function(e) {

  if (e.key === "Enter") {
    sendMsg();
  }

});

</script>

</body>
</html>
